{% extends "base.html" %}
{% block title %}Add Customer BankFlow{% endblock %}
{% block back_link %}
<a href="{{ url_for('customers.list_customers') }}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left"></i> Back to Customers
</a>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="fw-bold mb-3">Add Customer</h3>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CNIC</label>
                        <input type="text" name="cnic" class="form-control" placeholder="34101-1234567-8" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control">
                    </div>
                    {% if branches %}
                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <select name="branch_id" class="form-select" required>
                            {% for b in branches %}
                            <option value="{{ b.branch_id }}">{{ b.branch_name }} ({{ b.city }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}

                    <button class="btn text-white" style="background: var(--brand);">Save</button>
                    <a href="{{ url_for('customers.list_customers') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
