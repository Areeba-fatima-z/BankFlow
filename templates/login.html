<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BankFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand: #0d5c63;
            /* deep teal */
            --brand-dark: #04292e;
            --accent: #ffb703;
        }

        body {
            background: #f4f6f8;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: .3px;
        }

        .bg-brand {
            background: linear-gradient(90deg, var(--brand-dark), var(--brand));
        }

        /* Dashboard tiles */
        .tile {
            border: none;
            border-radius: 14px;
            transition: transform .15s ease, box-shadow .15s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            height: 100%;
        }

        .tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(13, 92, 99, .15);
        }

        .tile .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(13, 92, 99, .10);
            color: var(--brand);
            margin-bottom: 14px;
        }

        .tile h6 {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tile .small {
            color: #7a8a94;
        }

        .role-badge {
            background: var(--accent);
            color: #04292e;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: .78rem;
        }

        .login-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(4, 41, 46, .12);
        }
    </style>
</head>

<body>



    <div class="container mt-4">



        <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="col-md-4">
                <div class="card login-card">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <div class="mb-2" style="font-size: 2.6rem; color: var(--brand);">
                                <i class="bi bi-bank2"></i>
                            </div>
                            <h3 class="fw-bold mb-1">BankFlow</h3>
                            <p class="text-muted small mb-0">Banking & Financial Management</p>
                        </div>

                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control" placeholder="Enter username"
                                        required autofocus>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control"
                                        placeholder="Enter password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn w-100 text-white fw-semibold"
                                style="background: var(--brand); padding: 10px;">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Login
                            </button>
                        </form>

                    </div>
                </div>
                <p class="text-center text-muted small mt-3">© 2026 BankFlow</p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
