{% extends "base.html" %}
{% block title %}Apply for Loan BankFlow{% endblock %}

{% block back_link %}
<a href="{{ url_for('loans.list_loans') }}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left"></i> Back to My Loans
</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="fw-bold mb-3">Apply for Loan</h3>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Loan Type</label>
                        <select name="loan_type" class="form-select" required>
                            <option value="">select type </option>
                            <option value="PERSONAL">Personal - 12.0% p.a.</option>
                            <option value="CAR">Car - 14.5% p.a.</option>
                            <option value="HOME">Home - 10.0% p.a.</option>
                            <option value="BUSINESS">Business - 15.0% p.a.</option>
                        </select>
                        <div class="form-text">Interest rate is set by the bank per loan type.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (Rs.)</label>
                        <input type="number" step="0.01" min="0.01" name="amount" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tenure (months)</label>
                        <select name="tenure_month" class="form-select" required>
                            <option value="6">6 months</option>
                            <option value="12">12 months</option>
                            <option value="24">24 months</option>
                            <option value="36">36 months</option>
                            <option value="60">60 months</option>
                        </select>
                    </div>
                    <button class="btn text-white" style="background: var(--brand);">
                        <i class="bi bi-send"></i> Submit Application
                    </button>
                    <a href="{{ url_for('loans.list_loans') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
