{% extends "base.html" %}
{% block title %}Deposit BankFlow{% endblock %}
{% block back_link %}
<a href="{{ url_for('dashboard') }}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
</a>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="fw-bold mb-3">Deposit</h3>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Account</label>
                        <select name="account_id" class="form-select" required>
                            <option value="">-- select account --</option>
                            {% for a in accounts %}
                            <option value="{{ a.account_id }}">{{ a.acc_number }} — {{ a.full_name }} ({{ "Rs.
                                %.2f"|format(a.balance/100) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (Rs.)</label>
                        <input type="number" step="0.01" min="0.01" name="amount" class="form-control" required>
                    </div>
                    <button class="btn text-white" style="background: var(--brand);">Deposit</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
